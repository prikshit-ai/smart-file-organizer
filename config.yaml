# Smart File Organizer — Configuration File
# Place this file in your project root or at ~/.config/smart-file-organizer/config.yaml

# Custom file extension → folder name rules.
# These OVERRIDE the built-in defaults.
# Format:  ".extension": "FolderName"
# Examples:  ".mp4": "Videos/Work"   ".pdf": "Documents/PDFs"   ".torrent": "Torrents"
rules: {}

# Optional: set a default watch folder (used if no folder argument is given)
# watch_folder: "/Users/yourname/Downloads"

# Suppress desktop notifications globally (same effect as CLI --silent)
# silent: false

# Desktop notifications on successful moves (default: true). Set false to disable
# without using silent: true (handy if you only want to mute notifications).
# notifications: true

# Always run in dry-run mode (safe preview, never moves files)
# dry_run: false

# Human-readable move audit log (default: organizer.log in the watch folder).
# Relative paths are resolved against the watch folder; absolute paths are allowed.
# organizer_log: "organizer.log"
# organizer_log: "logs/organizer.log"
